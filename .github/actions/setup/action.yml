name: Setup
description: Go toolchain plus cached libwhisper.a for the cgo build

runs:
  using: composite
  steps:
    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod
    - id: whisper
      shell: bash
      run: echo "rev=$(git -C third_party/whisper.cpp rev-parse HEAD)" >> "$GITHUB_OUTPUT"
    - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: third_party/whisper.cpp/build_go
        key: libwhisper-${{ runner.os }}-${{ steps.whisper.outputs.rev }}
    - shell: bash
      run: make build && go mod download
