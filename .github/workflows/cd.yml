name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      WHISPER: ${{ github.workspace }}/third_party/whisper.cpp
      WHISPER_INCLUDE: ${{ github.workspace }}/third_party/whisper.cpp/include
      WHISPER_GGML_INCLUDE: ${{ github.workspace }}/third_party/whisper.cpp/ggml/include
      WHISPER_BUILD_LINUX_AMD64: ${{ github.workspace }}/third_party/whisper.cpp/build_linux_amd64
      WHISPER_BUILD_LINUX_ARM64: ${{ github.workspace }}/third_party/whisper.cpp/build_linux_arm64
      WHISPER_BUILD_DARWIN_AMD64: ${{ github.workspace }}/third_party/whisper.cpp/build_darwin_amd64
      WHISPER_BUILD_DARWIN_ARM64: ${{ github.workspace }}/third_party/whisper.cpp/build_darwin_arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: latest

      # ── zig wrappers for all four cross-compilation targets ───────────────
      - name: Create zig cross-compile wrappers
        run: |
          for target in \
            "linux-amd64:x86_64-linux-gnu.2.17" \
            "linux-arm64:aarch64-linux-gnu.2.17" \
            "darwin-amd64:x86_64-macos.12" \
            "darwin-arm64:aarch64-macos.12"; do
            name="${target%%:*}"; triple="${target##*:}"
            printf '#!/bin/sh\nexec zig cc  -target %s "$@"\n' "$triple" | sudo tee /usr/local/bin/zcc-"$name" > /dev/null
            printf '#!/bin/sh\nexec zig c++ -target %s "$@"\n' "$triple" | sudo tee /usr/local/bin/zxx-"$name" > /dev/null
          done
          sudo chmod +x /usr/local/bin/zcc-* /usr/local/bin/zxx-*

      # ── libwhisper — Linux (all backends enabled) ─────────────────────────
      - name: Build libwhisper (linux/amd64)
        run: |
          cmake -S $WHISPER -B $WHISPER_BUILD_LINUX_AMD64 \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=OFF
          cmake --build $WHISPER_BUILD_LINUX_AMD64 --target whisper -j$(nproc)
      - name: Build libwhisper (linux/arm64)
        run: |
          cmake -S $WHISPER -B $WHISPER_BUILD_LINUX_ARM64 \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=OFF \
            -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=zcc-linux-arm64 -DCMAKE_CXX_COMPILER=zxx-linux-arm64
          cmake --build $WHISPER_BUILD_LINUX_ARM64 --target whisper -j$(nproc)

      # ── libwhisper — Darwin (Metal/BLAS off: xcrun unavailable on Linux) ──
      # The released macOS binary uses CPU inference. Users who need Metal
      # acceleration should build from source with `make build`.
      - name: Build libwhisper (darwin/amd64)
        run: |
          cmake -S $WHISPER -B $WHISPER_BUILD_DARWIN_AMD64 \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=OFF \
            -DGGML_METAL=OFF -DGGML_BLAS=OFF \
            -DCMAKE_SYSTEM_NAME=Darwin -DCMAKE_SYSTEM_PROCESSOR=x86_64 \
            -DCMAKE_C_COMPILER=zcc-darwin-amd64 -DCMAKE_CXX_COMPILER=zxx-darwin-amd64
          cmake --build $WHISPER_BUILD_DARWIN_AMD64 --target whisper -j$(nproc)
      - name: Build libwhisper (darwin/arm64)
        run: |
          cmake -S $WHISPER -B $WHISPER_BUILD_DARWIN_ARM64 \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=OFF \
            -DGGML_METAL=OFF -DGGML_BLAS=OFF \
            -DCMAKE_SYSTEM_NAME=Darwin -DCMAKE_SYSTEM_PROCESSOR=arm64 \
            -DCMAKE_C_COMPILER=zcc-darwin-arm64 -DCMAKE_CXX_COMPILER=zxx-darwin-arm64
          cmake --build $WHISPER_BUILD_DARWIN_ARM64 --target whisper -j$(nproc)

      # Stub out the missing Metal/BLAS libs so the CGO link step resolves
      # -lggml-metal and -lggml-blas without undefined-symbol errors.
      - name: Stub missing darwin libs (Metal/BLAS disabled)
        run: |
          for arch in amd64 arm64; do
            build="$WHISPER/build_darwin_$arch"
            for backend in ggml-metal ggml-blas; do
              dir="$build/ggml/src/$backend"
              mkdir -p "$dir"
              # Compile a trivial object so ar produces a valid archive.
              echo "void __${backend//-/_}_stub(void) {}" \
                | zig cc -target "$([ "$arch" = arm64 ] && echo aarch64-macos.12 || echo x86_64-macos.12)" \
                  -c -x c - -o /tmp/"$backend"-"$arch".o
              ar crs "$dir/lib$backend.a" /tmp/"$backend"-"$arch".o
            done
          done

      # ── Docker ───────────────────────────────────────────────────────────
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
